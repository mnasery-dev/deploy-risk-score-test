# .github/workflows/deploy-risk-analysis.yml
#
# Runs the DeploySense risk pipeline when a PR is created.
# Posts the analysis as a PR comment.

name: DeploySense Risk Analysis

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write

jobs:
  risk-analysis:
    runs-on: ubuntu-latest
    name: Analyze Deployment Risk
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install httpx

      - name: Run DeploySense Pipeline
        id: analysis
        env:
          NR_API_KEY: ${{ secrets.NR_API_KEY }}
          GHE_TOKEN: ${{ secrets.GHE_TOKEN }}
          NERD_COMPLETION_TOKEN: ${{ secrets.NERD_COMPLETION_TOKEN }}
        run: |
          # Run the pipeline — analysis goes to stdout, logs to stderr
          python scripts/risk_pipeline.py \
            --entity-guid "${{ vars.ENTITY_GUID }}" \
            --account-id "${{ vars.ACCOUNT_ID }}" \
            --timestamp-ms "$(python -c 'import time; print(int(time.time()*1000))')" \
            --nr-api-key "$NR_API_KEY" \
            --ghe-token "$GHE_TOKEN" \
            --llm-token "$NERD_COMPLETION_TOKEN" \
            --target-index 0 \
            > /tmp/risk_analysis.md 2> /tmp/pipeline.log

          echo "Pipeline logs:"
          cat /tmp/pipeline.log

          # Truncate if too long for GH comment (max 65536 chars)
          if [ $(wc -c < /tmp/risk_analysis.md) -gt 60000 ]; then
            head -c 60000 /tmp/risk_analysis.md > /tmp/risk_comment.md
            echo -e "\n\n---\n*[Analysis truncated — full report available in workflow artifacts]*" >> /tmp/risk_comment.md
          else
            cp /tmp/risk_analysis.md /tmp/risk_comment.md
          fi

      - name: Post PR Comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const analysis = fs.readFileSync('/tmp/risk_comment.md', 'utf8');

            // Check if we already commented (avoid duplicates on re-runs)
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.includes('<!-- deploysense-risk-analysis -->'));

            const body = `<!-- deploysense-risk-analysis -->
## 🔍 DeploySense Risk Analysis

${analysis}

---
*Powered by [DeploySense](https://github.com/${{ github.repository }}) — AI-powered deployment risk prediction*`;

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body,
              });
            }

      - name: Upload Full Analysis as Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: risk-analysis
          path: |
            /tmp/risk_analysis.md
            /tmp/pipeline.log
