name: Deploy Risk Score

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: write
  statuses: write

jobs:
  risk-score:
    runs-on: ubuntu-latest
    name: Calculate Deployment Risk
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Deploy Risk Score
        id: risk
        env:
          NR_API_KEY: ${{ secrets.NR_API_KEY }}
          NR_ACCOUNT_ID: ${{ secrets.NR_ACCOUNT_ID }}
          NR_ENTITY_GUID: ${{ secrets.NR_ENTITY_GUID }}
          NR_REGION: 'US'
          GHE_TOKEN: ${{ github.token }}
          RISK_THRESHOLD: '80'
          WARN_THRESHOLD: '50'
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_REPO: ${{ github.repository }}
          GITHUB_BASE_REF: ${{ github.event.pull_request.base.sha || github.event.before || '' }}
          GITHUB_HEAD_REF: ${{ github.sha }}
        run: python .github/scripts/score.py

      - name: Post commit status
        if: always()
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          SCORE="${{ steps.risk.outputs.risk-score }}"
          LEVEL="${{ steps.risk.outputs.risk-level }}"

          STATE="success"
          if [ "$LEVEL" = "CRITICAL" ] || [ "$LEVEL" = "HIGH" ]; then
            STATE="failure"
          fi

          curl -s -X POST \
            -H "Authorization: token $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${{ github.repository }}/statuses/${{ github.sha }}" \
            -d "{
              \"state\": \"$STATE\",
              \"description\": \"Risk Score: ${SCORE}/100 (${LEVEL})\",
              \"context\": \"deploy-intelligence/risk-score\"
            }"

      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const score = '${{ steps.risk.outputs.risk-score }}';
            const level = '${{ steps.risk.outputs.risk-level }}';
            const rec = '${{ steps.risk.outputs.recommendation }}';
            const emoji = {LOW: '✅', MEDIUM: '⚠️', HIGH: '🔶', CRITICAL: '🚨'}[level] || '❓';

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `## ${emoji} Deploy Risk Score: ${score}/100 (${level})\n\n${rec}\n\n---\n*Powered by Deploy Intelligence*`
            });
